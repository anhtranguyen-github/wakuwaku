        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - study_material
              properties:
                study_material:
                  type: object
                  required:
                    - subject_id
                  properties:
                    subject_id:
                      type: integer
                    meaning_note:
                      type: string
                      nullable: true
                    reading_note:
                      type: string
                      nullable: true
                    meaning_synonyms:
                      type: array
                      items:
                        type: string
      responses:
        "200":
