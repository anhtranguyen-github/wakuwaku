services:
  backend:
    build:
      context: ./hanachan-fastapi
      dockerfile: Dockerfile
    container_name: hanachan-backend
    restart: always
    ports:
      - "7000:8000"
    volumes:
      - ./hanachan-fastapi/src:/app/src
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:7000}
      - API_V1_STR=/v2
      - PROJECT_NAME=Hanachan WaniKani
      - VERSION=20170710
      - PYTHONPATH=/app/src
    env_file:
      - .env

  nginx:
    image: nginx:alpine
    container_name: hanachan-nginx
    restart: always
    ports:
      - "7100:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./kanjischool/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
