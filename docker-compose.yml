services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hanachan-api
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --no-server-header
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:8000}
      - API_V1_STR=/v2
      - PROJECT_NAME=Hanachan WaniKani
      - VERSION=20170710
      - PYTHONPATH=src
    env_file:
      - .env
